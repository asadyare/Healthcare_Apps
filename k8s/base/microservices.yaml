apiVersion: v1
kind: Namespace
metadata:
  name: healthcare
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: care-connect-360
  namespace: healthcare
  labels:
    app: care-connect-360
spec:
  replicas: 2
  selector:
    matchLabels:
      app: care-connect-360
  template:
    metadata:
      labels:
        app: care-connect-360
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: 733366528696.dkr.ecr.us-east-1.amazonaws.com/healthcare/care-connect-360:v0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: SQLITE_PATH
              value: /tmp/careconnect.db
          volumeMounts:
            - name: app-secrets
              mountPath: /run/secrets/app
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: app-secrets
          secret:
            secretName: care-connect-360-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: care-connect-360
  namespace: healthcare
spec:
  selector:
    app: care-connect-360
  ports:
    - port: 80
      targetPort: 3000
---
