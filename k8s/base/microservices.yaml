---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: healthcare
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-api
  namespace: healthcare
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.healthcare.example.com # TODO: replace hostname
      secretName: healthcare-api-tls
  rules:
    - host: api.healthcare.example.com # TODO: replace hostname
      http:
        paths:
          - path: /careconnect
            pathType: Prefix
            backend:
              service:
                name: care-connect-360
                port:
                  number: 80
          - path: /medtrack
            pathType: Prefix
            backend:
              service:
                name: medtrack-pro
                port:
                  number: 80
          - path: /healthhub
            pathType: Prefix
            backend:
              service:
                name: healthhub-mobile
                port:
                  number: 80
