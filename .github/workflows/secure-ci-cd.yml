name: secure-ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      confirm_deploy:
        description: "Type DEPLOY to confirm deployment"
        required: true
        default: "NO"

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_PREFIX: healthcare

jobs:
  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .security/gitleaks.toml

      - name: Secret scan (trufflehog pull request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

      - name: Secret scan (trufflehog push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --results=verified,unknown

      - name: Secret scan (trufflehog manual)
        if: github.event_name == 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

      - name: SAST (semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            auto
            .security/semgrep-rules.yaml

      - name: SCA (npm audit)
        run: npm audit --omit=dev --audit-level=critical

      - name: IaC scan (checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          config_file: .security/checkov.yaml

      - name: Filesystem vuln scan (trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  terraform-validate:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    needs: security-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Configure AWS Credentials (OIDC)
        if: github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Terraform init backend
        if: github.event_name == 'workflow_dispatch'
        working-directory: infra/terraform
        run: terraform init -reconfigure

      - name: Terraform plan
        if: github.event_name == 'workflow_dispatch'
        working-directory: infra/terraform
        run: terraform plan -out tfplan

      - name: Upload plan artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: infra/terraform/tfplan

  build-and-scan-images:
    name: Build and Scan Service Images
    runs-on: ubuntu-latest
    needs: security-gates
    strategy:
      matrix:
        service:
          - care-connect-360
          - medtrack-pro
          - healthhub-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            apps/${{ matrix.service }}/server

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Configure AWS Credentials (OIDC)
        if: github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Push image to ECR
        if: github.event_name == 'workflow_dispatch'
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_PREFIX}/${{ matrix.service }}:v0.1.0"
          if aws ecr describe-images --repository-name "${ECR_PREFIX}/${{ matrix.service }}" --image-ids imageTag=v0.1.0 --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "ECR image ${ECR_IMAGE} already exists; skipping immutable tag push."
            exit 0
          fi
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker tag "${{ matrix.service }}:${{ github.sha }}" "${ECR_IMAGE}"
          docker push "${ECR_IMAGE}"

  pre-deploy-double-check:
    name: Final Pre-Deploy Double Check
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.deploy_environment }}
    runs-on: ubuntu-latest
    needs: [terraform-validate, build-and-scan-images]
    steps:
      - name: Confirm manual deployment approval
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "DEPLOY" ]; then
            echo "Deployment confirmation failed. Type DEPLOY to continue."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Ensure Kubernetes namespace
        run: kubectl create namespace healthcare --dry-run=client -o yaml | kubectl apply -f -

      - name: Kubernetes dry-run validation
        run: kubectl apply --dry-run=server -f k8s/base/microservices.yaml

      - name: Kubernetes diff review
        run: kubectl diff -f k8s/base/microservices.yaml || true

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/base/microservices.yaml

      - name: Rollout status verification
        run: |
          kubectl rollout status deployment/care-connect-360 -n healthcare --timeout=180s
          kubectl rollout status deployment/medtrack-pro -n healthcare --timeout=180s
          kubectl rollout status deployment/healthhub-mobile -n healthcare --timeout=180s
